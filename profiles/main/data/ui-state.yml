  nges\":[[\"0.1.0\",\"0.44.0\"]],\"cwe\":[\"CWE-190\"],\"tldr\":\"Affected
  versions of this package are vulnerable to an EVM gas accounting overflow when
  processing batched transactions, allowing the total computed gas to wrap
  around and be underestimated. By crafting a batch with carefully sized
  offsets/lengths and large individual EVM calls, an attacker can trigger index
  or arithmetic overflows during decoding or gas aggregation, causing the system
  to accept and execute high-gas transactions while charging little or no gas.
