  Akka Cluster Bootstrap) generates predictable DNS transaction IDs, making DNS
  resolution vulnerable to poisoning attacks. An attacker can forge DNS
  responses with matching transaction IDs, redirecting traffic to malicious
  endpoints. If the application does not validate the authenticity of discovered
  services (e.g., via TLS), this can lead to data exfiltration, such as
  persistence events being published to an unintended Kafka broker. If
  validation is in place, the attack results in a denial of access to the
  intended service.\",\"doest_this_affect_me\":\"You are affected if you are
