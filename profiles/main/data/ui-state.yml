  dr\":\"Affected versions of this package are vulnerable to insufficient
  session expiration because active sessions or refresh tokens remain valid
  after a user changes or resets their password, allowing previously compromised
  sessions to continue being used. In Strapi, this behavior could enable an
  attacker with access to a stolen session to maintain unauthorized access even
  after credentials are updated. The patch fixes this by revoking existing
  sessions and tokens upon password changes and resets, ensuring continued
