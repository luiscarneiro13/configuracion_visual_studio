  ],[\"5.0.0\",\"5.9.10\"]],\"cwe\":[\"CWE-94\"],\"tldr\":\"Affected versions of
  this package are vulnerable to a remote code execution (RCE) vulnerability
  stemming from unsafe processing of serialized condition configuration data,
  which could allow untrusted input to be interpreted in a way that executes
