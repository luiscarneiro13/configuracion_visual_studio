  differentials or downstream mishandling of malformed input. The release adds
  an explicit check so those code paths fail parsing when an unescaped control
  character appears in a string.\",\"doest_this_affect_me\":\"You are affected
  if you are using a version that falls within the vulnerable
  range.\",\"how_to_fix\":\"Upgrade the `open-source-parsers.jsoncpp` library to
