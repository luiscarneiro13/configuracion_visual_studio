  `Content-Security-Policy` (CSP) headers to all SVG uploads in core and storage
  adapters, which prevents execution of inline scripts in SVG content by default
  and reduces the risk of “SVG smuggling”-style attacks. This defensive layer
  complements existing SVG validation and gives developers additional assurance
  that untrusted SVGs won’t execute script in
