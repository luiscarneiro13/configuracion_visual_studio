  sions\":[\"1.6.3\"],\"vulnerable_ranges\":[[\"1.4.0\",\"1.6.2\"]],\"cwe\":[\"\
  CWE-522\"],\"tldr\":\"After a backup code was consumed, the plugin rewrote the
  remaining codes using the built-in encryption path even when the deployment
  configured plain text or a custom `storeBackupCodes` strategy. Subsequent
  verification could then fail for legitimate users, effectively breaking
  second-factor recovery. The fix re-saves remaining codes with the same
  strategy the application configured.\",\"doest_this_affect_me\":\"You are
  affected if you are using a version that falls within the vulnerable
  range.\",\"how_to_fix\":\"Upgrade the `better-auth` library to the patch
  version.\",\"vulnerable_to\":\"Incorrect
