  st_updated_at\":1773738157},{\"package_name\":\"better-auth\",\"patch_versions\
  \":[\"1.6.3\"],\"vulnerable_ranges\":[[\"0.0.1\",\"1.6.2\"]],\"cwe\":[\"CWE-2\
  87\"],\"tldr\":\"The two-factor plugin did not consistently run its
  enforcement hook on every code path that creates a new session. Sign-in
  methods such as magic links, OAuth, passkeys, email OTP, and SIWE could
  therefore establish a session without satisfying configured second-factor
  requirements. The fix runs the post-hook whenever a new session is created,
  while excluding routine authenticated requests that only refresh or update an
  existing session.\",\"doest_this_affect_me\":\"You are affected if you are
  using a version that falls within the vulnerable
  range.\",\"how_to_fix\":\"Upgrade the `better-auth` library to the patch
  version.\",\"vulnerable_to\":\"Insufficient
