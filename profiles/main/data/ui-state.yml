  processes around 64GB of data in one chunk. Protocols like TLS and SSH are
  unaffected since they break large data into smaller chunks. Most applications
  also do not handle such large amounts of data in a single operation. By
  default, overflow checking is disabled in release mode but can be enabled
  using `RUSTFLAGS=\\\"-C overflow-checks\\\"` or `overflow-checks = true` in
