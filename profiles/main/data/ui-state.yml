  ons\":[\"1.6.3\"],\"vulnerable_ranges\":[[\"1.2.0\",\"1.6.2\"]],\"cwe\":[\"CW\
  E-918\"],\"tldr\":\"Direct `auth.api` calls and plugins that resolve a dynamic
  `baseURL` could leave `baseURL` empty, mishandle `allowedHosts` failures, or
  trust forwarded host/proto headers without the same gates as the normal
  request path. Plugin metadata helpers could call back into `auth.api` without
  the incoming request, so discovery and issuer URLs might not match the
  caller’s host. The fix tightens resolution, maps host mismatches to explicit
  API errors, threads trusted-proxy settings consistently, and forwards the real
  request into metadata and MCP helpers where needed. Deployments that also use
  `@better-auth/oauth-provider` should upgrade that package to the same patch
  line because it contains coordinated metadata and MCP
  changes.\",\"doest_this_affect_me\":\"You are affected if you are using a
  version that falls within the vulnerable range.\",\"how_to_fix\":\"Upgrade the
  `better-auth` library to the patch version.\",\"vulnerable_to\":\"Server-Side
  Request Forgery
  (SSRF)\",\"related_cve_id\":\"\",\"language\":\"JS\",\"severity_class\":\"HIGH\
  \",\"aikido_score\":70,\"changelog\":\"https://github.com/better-auth/better-\
  auth/releases/tag/v1.6.3\",\"last_modified\":\"2026-04-15\",\"published\":\"2\
  026-04-15\",\"id\":\"AIKIDO-2026-10485\",\"created_at\":1776257078,\"last_upd\
  ated_at\":1776257078},{\"package_name\":\"better-auth\",\"patch_versions\":[\
  \"1.6.6\"],\"vulnerable_ranges\":[[\"1.3.18\",\"1.6.5\"]],\"cwe\":[\"CWE-918\
  \"],\"tldr\":\"Several code paths decide whether a host is loopback or safe to
  treat as a local development origin. The dynamic `allowedHosts` handling used
  substring tests on host strings, so hostnames that merely contained
  `localhost` or `127.0.0.1` as substrings could receive an extra trusted `http`
  origin alongside `https`. A separate helper also treated the IPv4 unspecified
  address like true loopback when inferring schemes, which could broaden what
  was considered a local origin. The update routes these decisions through the
  shared classifier from `@better-auth/core/utils/host` and replaces the
  dev-only scheme helper with a narrow check that does not pull that module into
  client bundles.\",\"doest_this_affect_me\":\"You are affected if you are using
  a version that falls within the vulnerable range.\",\"how_to_fix\":\"Upgrade
  the `better-auth` library to the patch
  version.\",\"vulnerable_to\":\"Server-Side Request Forgery
  (SSRF)\",\"related_cve_id\":\"\",\"language\":\"JS\",\"severity_class\":\"HIGH\
