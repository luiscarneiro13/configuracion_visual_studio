  nested inline fragments that project the same response name, the work in the
  conflict routine can grow far faster than linearly because inline fragments
  are not covered by the same memoization that applies to named fragments, so
  the validator can spend a long time in pure CPU on a small document. A shared
  comparison counter now increments across the recursive checks and returns a
  validation error when a configurable limit is exceeded, with a large default,
