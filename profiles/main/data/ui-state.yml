  `window.opener` object holds information about the original page that provided
  the link. If an attacker is able to run a script on the target page, they
  could potentially read or modify properties of the `window.opener` object,
  including the `location` property. This could allow the attacker to redirect
  the user to a malicious site, such as for phishing attacks, even if the
