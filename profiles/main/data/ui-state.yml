  to evade authentication and signup rate-limiting protections. This allows
  malicious users to bypass security controls such as login or registration
  throttling. The issue is fixed by distrusting the `X-Forwarded-For` header by
  default and requiring explicit proxy configuration or custom client IP
  resolution.\",\"doest_this_affect_me\":\"You are affected if you are using a
  version that falls within the vulnerable range.\",\"how_to_fix\":\"Upgrade the
