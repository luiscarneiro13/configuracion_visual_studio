  \":\"Several security vulnerabilities were quietly patched in `axios` version
  1.6.4 and version 0.29.0. Notably, a prototype pollution flaw impacted the
  `formDataToJSON` function, posing a significant risk. Additionally, a Regular
  Expression Denial of Service (ReDoS) vulnerability was identified and fixed in
  the `combineURLs` function.\",\"doest_this_affect_me\":\"You are affected by
  this flaw if you use the formDataToJSON function. This is more likely to
  happen in a front-end than in a backend.\",\"how_to_fix\":\"To fix, either
  freeze the prototype or upgrade to axios 1.6.4 or
  above.\",\"vulnerable_to\":\"Prototype
  Pollution\",\"related_cve_id\":\"\",\"language\":\"JS\",\"severity_class\":\"\
