  dr\":\"Affected versions of this package are vulnerable to a path traversal
  attack due to insufficient input validation in `destinationDir` and
  `publicBasePath` parameters, where the code fails to check for path traversal
  sequences, block null bytes and malicious characters, and prevent directory
  escape while allowing absolute paths. This flaw enables attackers to craft
  malicious inputs that bypass intended restrictions, potentially allowing them
  to access or modify sensitive files outside the designated directory, leading
  to information disclosure or system
  compromise.\",\"doest_this_affect_me\":\"You are affected if you are using a
  version that falls within the vulnerable range.\",\"how_to_fix\":\"Upgrade the
  `sitemap` library to the patch version.\",\"vulnerable_to\":\"Improper
  Limitation of a Pathname to a Restricted Directory ('Path
