  st_updated_at\":1777061678}],\"@dotenvx/dotenvx\":[{\"package_name\":\"@doten\
  vx/dotenvx\",\"patch_versions\":[\"1.61.6\"],\"vulnerable_ranges\":[[\"1.24.0\
  \",\"1.61.5\"]],\"cwe\":[\"CWE-78\"],\"tldr\":\"In `src/lib/helpers/parse.js`,
  after `decrypt()` runs, string values that still match the `encrypted:`
  ciphertext form were passed through the same `evalKeyValue` / `eval` path and
  the `expand` / `resolveEscapeSequences` path as normal secrets. A value can
  therefore embed shell command substitution (for example `$(…)` in the payload)
  that is executed while resolving the variable, even though the value is only
  intended to be opaque encrypted material. Before the change, the parser had no
  `isEncrypted` / `encrypted:` check before those steps. The update treats
  encrypted-prefixed values as non-evaluatable: it sets `encryptedPrefixed` from
  `isEncrypted(this.parsed[key])` and skips both the eval and escape-expansion
  blocks when that flag is true, so `encrypted:` secrets are not expanded or run
  as shell commands.\",\"doest_this_affect_me\":\"You are affected if you are
  using a version that falls within the vulnerable
  range.\",\"how_to_fix\":\"Upgrade the `@dotenvx/dotenvx` library to the patch
  version.\",\"vulnerable_to\":\"OS command
  injection\",\"related_cve_id\":\"\",\"language\":\"JS\",\"reporter\":\"Scott
  Motte\",\"severity_class\":\"HIGH\",\"aikido_score\":75,\"changelog\":\"https\
  ://github.com/dotenvx/dotenvx/releases/tag/v1.61.6\",\"last_modified\":\"2026\
  -04-24\",\"published\":\"2026-04-24\",\"id\":\"AIKIDO-2026-10538\",\"created_\
  at\":1777032158,\"last_updated_at\":1777121078}]}}}"
