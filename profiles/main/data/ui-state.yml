  reveal and release it at a precise moment to influence fork choice,
  potentially triggering a chain reorganization and rewriting recent history.
  This timing attack exploits the lack of enforced secret maturity, allowing
  adversaries to manipulate block validity conditions during sealing. The fix
  introduces versioned parent-secret maturity delays and stricter audit
  validation to ensure seal key material derives from sufficiently mature
  history.\",\"doest_this_affect_me\":\"You are affected if you are using a
  version that falls within the vulnerable range.\",\"how_to_fix\":\"Upgrade the
