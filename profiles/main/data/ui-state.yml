  pp\",\"patch_versions\":[\"1.9.7\"],\"vulnerable_ranges\":[[\"0.0.1\",\"1.9.6\
  \"]],\"cwe\":[\"CWE-416\"],\"tldr\":\"The `Reader::parse(std::istream&)`
  overload read the stream into a local `std::string`, then forwarded pointers
  into that buffer to `parse(const char*, const char*)`, which stored them in
  `begin_` / `end_`. After `parse` returned, the local string was destroyed
  while the reader could still hold those pointers. Calling
  `getFormattedErrorMessages()` afterward could read freed memory. The fix reads
  the stream into the member `document_` so the buffer lifetime matches the
  reader, consistent with `parse(const
  std::string&)`.\",\"doest_this_affect_me\":\"You are affected if you are using
  a version that falls within the vulnerable range.\",\"how_to_fix\":\"Upgrade
  the `open-source-parsers.jsoncpp` library to the patch
