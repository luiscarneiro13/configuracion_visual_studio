  ated_at\":1765302636},{\"package_name\":\"better-auth\",\"patch_versions\":[\
  \"1.5.5\"],\"vulnerable_ranges\":[[\"1.0.0\",\"1.5.4\"]],\"cwe\":[\"CWE-601\"\
  ],\"tldr\":\"The password reset request endpoint (`requestPasswordReset`) did
  not validate the `redirectTo` parameter against trusted origins. A client
  could send a `redirectTo` pointing to an untrusted or malicious URL; after the
  user completed the reset flow they could be redirected there, enabling open
  redirect and phishing. Before the fix, no origin check middleware was applied
  to this route, so `redirectTo` was not validated. The patch adds
  `originCheck((ctx) => ctx.body.redirectTo)` to the request handler so
  untrusted `redirectTo` values are rejected with 403 and `Invalid
  redirectURL`.\",\"doest_this_affect_me\":\"You are affected if you are using a
  version that falls within the vulnerable range.\",\"how_to_fix\":\"Upgrade the
  `better-auth` library to the patch version.\",\"vulnerable_to\":\"Open
